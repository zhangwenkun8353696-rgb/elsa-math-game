<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>艾莎的魔法数字王国</title>
<style>
  /* ========== 全局重置 ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ========== 背景场景 ========== */
  body {
    background: linear-gradient(180deg, #0b1628 0%, #0f2847 20%, #1a4a7a 40%, #2d6da8 60%, #4a90c4 80%, #7ab8e0 100%);
    position: relative;
  }

  /* 星空背景 */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.3; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  /* 持续飘落的雪花背景 */
  .snow-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1; overflow: hidden;
  }
  .snow-particle {
    position: absolute;
    color: white;
    opacity: 0.6;
    animation: snow-fall linear infinite;
    top: -30px;
  }
  @keyframes snow-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
  }

  /* ========== 主容器 ========== */
  #app {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ========== 开始页面 ========== */
  #start-screen {
    text-align: center;
    animation: fadeIn 1s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .castle-emoji {
    font-size: 80px;
    animation: float 3s ease-in-out infinite;
    text-shadow: 0 0 30px rgba(147, 197, 253, 0.5);
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .elsa-avatar {
    font-size: 100px;
    display: block;
    margin: 10px auto;
    animation: float 3s ease-in-out infinite;
    animation-delay: 0.5s;
  }

  .game-title {
    font-size: 28px;
    font-weight: bold;
    color: #e1f5fe;
    text-shadow: 0 0 20px rgba(100, 181, 246, 0.8), 0 2px 4px rgba(0,0,0,0.3);
    margin: 15px 0;
    line-height: 1.4;
  }
  .game-subtitle {
    font-size: 16px;
    color: #b3e5fc;
    margin-bottom: 25px;
  }

  .start-btn {
    display: inline-block;
    padding: 18px 50px;
    font-size: 24px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #7c4dff, #448aff, #40c4ff);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(68, 138, 255, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.3s;
    animation: pulse-btn 2s ease-in-out infinite;
  }
  .start-btn:active {
    transform: scale(0.95);
    box-shadow: 0 4px 15px rgba(68, 138, 255, 0.3);
  }
  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 8px 25px rgba(68, 138, 255, 0.4); }
    50% { box-shadow: 0 8px 40px rgba(68, 138, 255, 0.7), 0 0 60px rgba(68, 138, 255, 0.3); }
  }

  /* ========== 游戏页面 ========== */
  #game-screen {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
  }

  /* 顶部信息栏 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    padding-top: max(12px, env(safe-area-inset-top));
  }
  .level-badge {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 6px 16px;
    border-radius: 20px;
    color: #e1f5fe;
    font-size: 14px;
    font-weight: bold;
  }
  .stars-bar {
    display: flex;
    gap: 2px;
    font-size: 18px;
    flex-wrap: nowrap;
  }
  .star-icon {
    transition: all 0.3s;
    filter: grayscale(1) opacity(0.3);
  }
  .star-icon.earned {
    filter: none;
    animation: star-pop 0.5s ease-out;
  }
  @keyframes star-pop {
    0% { transform: scale(0); }
    50% { transform: scale(1.5); }
    100% { transform: scale(1); }
  }

  /* 场景区域 */
  .scene-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    position: relative;
    min-height: 0;
  }

  /* 艾莎对话框 */
  .elsa-dialog {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 15px;
    max-width: 340px;
  }
  .elsa-face {
    font-size: 50px;
    flex-shrink: 0;
    animation: float 3s ease-in-out infinite;
  }
  .dialog-bubble {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    border-top-left-radius: 5px;
    padding: 12px 16px;
    color: white;
    font-size: 16px;
    line-height: 1.5;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  /* 雪花展示区 */
  .snowflake-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0 5px;
    flex-wrap: wrap;
    min-height: 90px;
  }
  .flake-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 10px 15px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    min-width: 60px;
    align-items: center;
  }
  .flake-item {
    font-size: 36px;
    opacity: 0;
    transform: scale(0);
    cursor: pointer;
    transition: transform 0.2s;
    filter: drop-shadow(0 0 8px rgba(100, 181, 246, 0.6));
  }
  .flake-item.show {
    opacity: 1;
    transform: scale(1);
    animation: flake-appear 0.5s ease-out;
  }
  .flake-item.counted {
    animation: flake-bounce 0.3s ease-out;
    filter: drop-shadow(0 0 15px rgba(255, 235, 59, 0.8));
  }
  @keyframes flake-appear {
    0% { opacity: 0; transform: scale(0) rotate(-180deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes flake-bounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .plus-sign {
    font-size: 36px;
    color: #ffd54f;
    font-weight: bold;
    text-shadow: 0 0 15px rgba(255, 213, 79, 0.5);
  }
  .equals-area {
    text-align: center;
    margin: 8px 0;
  }
  .equals-sign {
    font-size: 30px;
    color: #ffd54f;
    font-weight: bold;
  }
  .count-display {
    font-size: 18px;
    color: #b3e5fc;
    margin-top: 5px;
    min-height: 24px;
  }

  /* 算式展示区 */
  .formula-display {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 8px 0;
    padding: 10px 20px;
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    min-height: 52px;
  }
  .formula-display.show { display: flex; }
  .formula-num {
    font-size: 34px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 15px rgba(100, 181, 246, 0.6);
    min-width: 36px;
    text-align: center;
    opacity: 0;
    transform: scale(0);
    transition: all 0.4s ease-out;
  }
  .formula-num.show {
    opacity: 1;
    transform: scale(1);
  }
  .formula-op {
    font-size: 30px;
    font-weight: bold;
    color: #ffd54f;
    text-shadow: 0 0 10px rgba(255, 213, 79, 0.5);
    opacity: 0;
    transition: all 0.4s ease-out;
  }
  .formula-op.show { opacity: 1; }
  .formula-answer {
    font-size: 38px;
    font-weight: bold;
    color: #ffd54f;
    text-shadow: 0 0 20px rgba(255, 213, 79, 0.6);
    min-width: 36px;
    text-align: center;
    opacity: 0;
    transform: scale(0);
    transition: all 0.5s ease-out;
  }
  .formula-answer.show {
    opacity: 1;
    transform: scale(1);
    animation: answer-pop 0.6s ease-out;
  }
  @keyframes answer-pop {
    0% { transform: scale(0); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* 合并动画区域 */
  .merge-area {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 12px 20px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    min-width: 60px;
    align-items: center;
    margin: 10px 0;
  }
  .merge-area .flake-item {
    opacity: 1;
    transform: scale(1);
  }

  /* 提示数一数按钮 */
  .count-hint-btn {
    display: none;
    margin: 8px auto;
    padding: 10px 28px;
    font-size: 16px;
    color: white;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 25px;
    cursor: pointer;
    backdrop-filter: blur(5px);
    transition: all 0.3s;
  }
  .count-hint-btn:active {
    transform: scale(0.95);
    background: rgba(255,255,255,0.25);
  }

  /* 选项区域 */
  .options-area {
    padding: 15px 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    display: flex;
    justify-content: center;
    gap: 15px;
  }
  .option-btn {
    width: 90px;
    height: 110px;
    border-radius: 22px;
    border: 3px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .option-btn:active {
    transform: scale(0.93);
  }
  .option-btn .num {
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .option-btn .mini-flakes {
    font-size: 10px;
    line-height: 1.2;
    max-width: 75px;
    text-align: center;
    word-break: break-all;
  }
  .option-btn.correct-flash {
    background: rgba(76, 175, 80, 0.5) !important;
    border-color: #66bb6a !important;
    animation: correct-shake 0.5s ease-out;
  }
  @keyframes correct-shake {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.1) rotate(-3deg); }
    50% { transform: scale(1.15); }
    75% { transform: scale(1.1) rotate(3deg); }
  }
  .option-btn.wrong-flash {
    background: rgba(255, 255, 255, 0.05) !important;
    border-color: rgba(255,255,255,0.15) !important;
    animation: wrong-shake 0.4s ease-out;
  }
  @keyframes wrong-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ========== 庆祝特效 ========== */
  .celebration {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100;
    pointer-events: none;
  }
  .celebration.active {
    display: block;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confetti-fall 1.5s ease-out forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* 魔法粒子特效 */
  .magic-burst {
    position: fixed;
    pointer-events: none;
    z-index: 90;
  }
  .magic-particle {
    position: absolute;
    border-radius: 50%;
    animation: magic-fly 1s ease-out forwards;
  }
  @keyframes magic-fly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* ========== 关卡完成页面 ========== */
  #level-complete {
    display: none;
    text-align: center;
    animation: fadeIn 0.8s ease-out;
  }
  .complete-emoji {
    font-size: 80px;
    animation: float 2s ease-in-out infinite;
  }
  .complete-title {
    font-size: 28px;
    font-weight: bold;
    color: #ffd54f;
    text-shadow: 0 0 20px rgba(255, 213, 79, 0.5);
    margin: 15px 0;
  }
  .complete-subtitle {
    font-size: 16px;
    color: #e1f5fe;
    margin-bottom: 25px;
  }
  .complete-stars {
    font-size: 40px;
    margin-bottom: 25px;
    letter-spacing: 5px;
  }
  .next-btn {
    display: inline-block;
    padding: 16px 45px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #ffd54f, #ff6f00);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(255, 111, 0, 0.4);
    margin: 8px;
  }
  .next-btn:active { transform: scale(0.95); }
  .next-btn.replay {
    background: linear-gradient(135deg, #7c4dff, #448aff);
    box-shadow: 0 8px 25px rgba(68, 138, 255, 0.4);
  }

  /* ========== 全部完成页面 ========== */
  #all-complete {
    display: none;
    text-align: center;
    animation: fadeIn 1s ease-out;
  }
  .crown { font-size: 100px; animation: float 2s ease-in-out infinite; }
  .final-title {
    font-size: 30px; font-weight: bold; color: #ffd54f;
    text-shadow: 0 0 20px rgba(255,213,79,0.5);
    margin: 15px 0;
  }
  .final-subtitle { font-size: 16px; color: #e1f5fe; margin-bottom: 30px; }

  /* ========== 音乐按钮 ========== */
  .music-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    top: max(12px, env(safe-area-inset-top));
    z-index: 200;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .music-btn:active { transform: scale(0.9); }
  .music-btn.playing {
    animation: music-pulse 1.5s ease-in-out infinite;
    border-color: rgba(100, 181, 246, 0.6);
  }
  @keyframes music-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(100,181,246,0.3); }
    50% { box-shadow: 0 0 15px 5px rgba(100,181,246,0.2); }
  }

  /* ========== 关卡选择页面 ========== */
  #level-select {
    display: none;
    text-align: center;
    animation: fadeIn 0.8s ease-out;
    width: 100%;
    height: 100%;
    padding: 0 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: max(15px, env(safe-area-inset-top));
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }
  .select-title {
    font-size: 26px;
    font-weight: bold;
    color: #e1f5fe;
    text-shadow: 0 0 20px rgba(100, 181, 246, 0.8);
    margin-bottom: 8px;
  }
  .select-subtitle {
    font-size: 15px;
    color: #b3e5fc;
    margin-bottom: 25px;
  }
  .level-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
    max-width: 320px;
    margin: 0 auto;
  }
  .level-card {
    width: 100%;
    padding: 18px 20px;
    border-radius: 22px;
    border: 2.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .level-card:active {
    transform: scale(0.96);
  }
  .level-card:hover {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.12);
  }
  .level-card-icon {
    font-size: 44px;
    flex-shrink: 0;
    width: 56px;
    text-align: center;
  }
  .level-card-info {
    text-align: left;
    flex: 1;
  }
  .level-card-name {
    font-size: 20px;
    font-weight: bold;
    color: white;
    margin-bottom: 4px;
  }
  .level-card-desc {
    font-size: 13px;
    color: #b3e5fc;
    line-height: 1.4;
  }
  .level-card-arrow {
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    flex-shrink: 0;
  }
  .level-card.card-1 { border-color: rgba(100,181,246,0.4); }
  .level-card.card-2 { border-color: rgba(255,213,79,0.4); }
  .level-card.card-3 { border-color: rgba(206,147,216,0.4); }

  .back-btn {
    display: inline-block;
    margin-top: 22px;
    padding: 10px 30px;
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .back-btn:active { transform: scale(0.95); opacity: 0.7; }

  /* ========== 工具类 ========== */
  .hidden { display: none !important; }

  /* 响应式 - 小屏幕 */
  @media (max-height: 650px) {
    .elsa-face { font-size: 40px; }
    .dialog-bubble { font-size: 14px; padding: 10px 14px; }
    .flake-item { font-size: 28px; }
    .plus-sign { font-size: 28px; }
    .option-btn { width: 80px; height: 95px; }
    .option-btn .num { font-size: 30px; }
    .castle-emoji { font-size: 60px; }
    .elsa-avatar { font-size: 80px; }
    .game-title { font-size: 24px; }
  }

  /* 大屏幕优化 */
  @media (min-width: 500px) {
    .option-btn { width: 110px; height: 130px; }
    .option-btn .num { font-size: 42px; }
    .flake-item { font-size: 42px; }
  }
  /* 艾莎头像图片 */
  .elsa-avatar-img {
    display: block;
    margin: 0 auto;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 4px 20px rgba(100, 180, 255, 0.4);
    object-fit: cover;
  }
  .elsa-avatar-img.large { width: 110px; height: 110px; }
  .elsa-avatar-img.medium { width: 75px; height: 75px; }
  .elsa-avatar-img.small { width: 48px; height: 48px; border-width: 2px; }
  .elsa-avatar-img.float {
    animation: float 3s ease-in-out infinite;
  }

  /* 冰雪山脉背景层 */
  .ice-mountains {
    position: fixed;
    bottom: 0; left: 0; width: 100%; height: 35%;
    pointer-events: none; z-index: 0;
    opacity: 0.12;
  }

  /* 极光效果 */
  .aurora {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 40%;
    pointer-events: none; z-index: 0;
    background: linear-gradient(135deg, 
      transparent 20%, 
      rgba(100, 200, 255, 0.06) 35%, 
      rgba(150, 100, 255, 0.04) 50%,
      rgba(100, 255, 200, 0.05) 65%,
      transparent 80%);
    animation: aurora-shift 8s ease-in-out infinite alternate;
  }
  @keyframes aurora-shift {
    0% { transform: translateX(-5%) skewX(-2deg); opacity: 0.5; }
    100% { transform: translateX(5%) skewX(2deg); opacity: 1; }
  }
</style>

<!-- ===== 冰雪山脉 SVG ===== -->

  <path d="M0 150 L30 80 L60 120 L100 40 L140 90 L170 50 L200 100 L240 30 L280 85 L310 55 L340 95 L370 60 L400 90 L400 150 Z" fill="white" opacity="0.5"/>
  <path d="M0 150 L50 100 L80 130 L120 70 L160 110 L190 75 L230 120 L260 60 L300 100 L340 80 L380 110 L400 90 L400 150 Z" fill="white" opacity="0.3"/>
</svg>
<body>

<!-- 极光效果 -->
<div class="aurora"></div>

<!-- 星空背景 -->
<div class="stars" id="stars"></div>

<!-- 飘雪背景 -->

<!-- ========== 音效 (Web Audio API) ========== -->
<script>
// ===== 音效系统 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type='sine', vol=0.15) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playCountSound(n) {
  // 音阶: C D E F G A B C D
  const notes = [523, 587, 659, 698, 784, 880, 988, 1047, 1175];
  playTone(notes[n % notes.length], 0.25, 'sine', 0.12);
}

function playCorrectSound() {
  ensureAudio();
  setTimeout(() => playTone(523, 0.15, 'sine', 0.1), 0);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.1), 120);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.1), 240);
  setTimeout(() => playTone(1047, 0.3, 'sine', 0.12), 360);
}

function playWrongSound() {
  playTone(200, 0.3, 'triangle', 0.08);
}

function playStartSound() {
  ensureAudio();
  setTimeout(() => playTone(523, 0.2, 'sine', 0.08), 0);
  setTimeout(() => playTone(659, 0.2, 'sine', 0.08), 150);
  setTimeout(() => playTone(784, 0.3, 'sine', 0.1), 300);
}

function playMagicSound() {
  ensureAudio();
  for (let i = 0; i < 5; i++) {
    setTimeout(() => playTone(800 + Math.random()*800, 0.2, 'sine', 0.05), i*80);
  }
}

// ===== 艾莎语音系统 (TTS) =====
let ttsVoice = null;
let ttsReady = false;
let ttsUnlocked = false;  // 手机端需要用户交互后才能使用

function initTTS() {
  if (!window.speechSynthesis) return;
  const loadVoices = () => {
    const voices = speechSynthesis.getVoices();
    if (voices.length === 0) return;
    // 优先选最甜美的中文女声
    const preferred = ['Xiaoxiao', 'Xiaoyi', 'Meijia', 'Ting-Ting', 'TingTing',
                       'Yaoyao', 'Huihui', 'Lili', 'Female', 'female'];
    for (const name of preferred) {
      const found = voices.find(v => v.lang.startsWith('zh') && v.name.includes(name));
      if (found) { ttsVoice = found; break; }
    }
    if (!ttsVoice) {
      ttsVoice = voices.find(v => v.lang === 'zh-CN') ||
                 voices.find(v => v.lang.startsWith('zh')) || null;
    }
    ttsReady = true;
  };
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  setTimeout(loadVoices, 500);
  setTimeout(loadVoices, 1500);
}

// 在用户首次点击时激活 TTS（手机端必须）
function unlockTTS() {
  if (ttsUnlocked || !window.speechSynthesis) return;
  ttsUnlocked = true;
  // iOS/Android 需要在用户手势中先说一个空白来激活
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  u.lang = 'zh-CN';
  speechSynthesis.speak(u);
  // 重新加载声音列表（有些手机需要激活后才能获取）
  setTimeout(() => {
    const voices = speechSynthesis.getVoices();
    if (voices.length > 0 && !ttsVoice) {
      const preferred = ['Xiaoxiao', 'Xiaoyi', 'Meijia', 'Ting-Ting', 'TingTing',
                         'Yaoyao', 'Huihui', 'Lili', 'Female', 'female'];
      for (const name of preferred) {
        const found = voices.find(v => v.lang.startsWith('zh') && v.name.includes(name));
        if (found) { ttsVoice = found; break; }
      }
      if (!ttsVoice) {
        ttsVoice = voices.find(v => v.lang === 'zh-CN') ||
                   voices.find(v => v.lang.startsWith('zh')) || null;
      }
      ttsReady = true;
    }
  }, 300);
}

// 核心语音函数：说完再回调
// 检测 TTS 是否真正可用
let ttsAvailable = false;
let ttsChecked = false;

function checkTTSAvailable() {
  if (ttsChecked) return ttsAvailable;
  if (!window.speechSynthesis) { ttsChecked = true; return false; }
  try {
    const voices = speechSynthesis.getVoices();
    if (voices.length > 0) { ttsAvailable = true; }
  } catch(e) {}
  ttsChecked = true;
  return ttsAvailable;
}

// ===== 内嵌音频播放系统（不依赖网络，100%可靠）=====

// 播放单个内嵌音频片段，完成后回调
function playClip(key, callback) {
  if (!AUDIO_DATA[key]) {
    if (callback) setTimeout(callback, 50);
    return;
  }
  const audio = new Audio(AUDIO_DATA[key]);
  audio.playbackRate = 1.25; // 加快语速
  let done = false;
  audio.onended = () => { if (!done) { done = true; if (callback) setTimeout(callback, 20); } };
  audio.onerror = () => { if (!done) { done = true; if (callback) setTimeout(callback, 50); } };
  // 超时保护（足够长以覆盖最长的片段）
  setTimeout(() => { if (!done) { done = true; if (callback) callback(); } }, 5000);
  audio.play().catch(() => { if (!done) { done = true; if (callback) setTimeout(callback, 50); } });
}

// 顺序播放多个音频片段（拼接成句子）
function playClipSequence(keys, callback) {
  let idx = 0;
  function next() {
    if (idx >= keys.length) {
      if (callback) setTimeout(callback, 80);
      return;
    }
    playClip(keys[idx], () => { idx++; next(); });
  }
  next();
}

  '🏰': 'i_chengbao', '💎': 'i_zuanshi', '🌈': 'i_caihong', '🎀': 'i_hudiejie',
  '👑': 'i_huangguan', '🏆': 'i_jiangbei'
};
// 数字 -> 音频 key
const numAudioKey = { 1:'n1', 2:'n2', 3:'n3', 4:'n4', 5:'n5', 6:'n6', 7:'n7', 8:'n8', 9:'n9' };

// ===== 核心语音函数（重写）=====
// 解析文本，拆成音频片段序列播放
function elsaSpeak(text, callback) {
  if (!text) { if (callback) setTimeout(callback, 300); return; }

  // 先尝试匹配预录完整语音
  const openKeys = {'小公主，来看看！':'open1','艾莎要变魔法啦！':'open2','准备好了吗？':'open3',
    '新的题来啦！':'open4','再来一题！':'open5','继续加油！':'open6','这次试试看！':'open7',
    '来看这个！':'open8','又有新题啦！':'open9','加油呀！':'open10',
    '再想想呀，不着急！':'enc1','没关系的，再试一次！':'enc2','点雪花数一数就知道啦！':'enc3',
    '把它们放到一起吧！':'merge','现在点一个数一个吧！':'countstart'};

  if (openKeys[text]) {
    playClip(openKeys[text], callback);
    return;
  }

  // 匹配读题模式："X个Y，加Z个Y，等于几呢？"
  const readMatch = text.match(/^(.+)个(.+)，加(.+)个(.+)，等于几呢？$/);
  if (readMatch) {
    const a = readMatch[1]; // 中文数字
    const item1 = readMatch[2];
    const b = readMatch[3];
    // 拼接：X + 个 + 物品 + 加 + Y + 个 + 物品 + 等于几呢
    const numMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
    const aKey = numAudioKey[numMap[a]];
    const bKey = numAudioKey[numMap[b]];
    const iKey = itemAudioKey[Object.keys(itemAudioKey).find(k => {
      const names = {'❄️':'雪花','⭐':'星星','⛄':'雪人','🦌':'小鹿','🏰':'城堡','💎':'钻石','🌈':'彩虹','🎀':'蝴蝶结','👑':'皇冠','🏆':'奖杯'};
      return names[k] === item1;
    })] || 'i_xuehua';

    const keys = [aKey, 'ge', iKey, 'jia', bKey, 'ge', iKey, 'dengyuji'];
    playClipSequence(keys, callback);
    return;
  }

  // 匹配答对模式："X加Y等于Z！太棒了！" 等
  const correctMatch = text.match(/^(.+)加(.+)等于(.+)！(.+)$/);
  if (correctMatch) {
    const numMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
    const aKey = numAudioKey[numMap[correctMatch[1]]];
    const bKey = numAudioKey[numMap[correctMatch[2]]];
    const cKey = numAudioKey[numMap[correctMatch[3]]];
    const praise = correctMatch[4];
    const praiseKeys = {'太棒了！':'taibangle','你真聪明！':'nizhenconming',
      '小公主真厉害！':'xiaogongzhuzhenlihai','太了不起了！':'tailebule','完美！':'wanmei'};
    const pKey = praiseKeys[praise] || 'taibangle';
    const keys = [aKey, 'jia', bKey, 'dengyu', cKey, pKey];
    playClipSequence(keys, callback);
    return;
  }

  // 兜底：播放提示音 + 给阅读时间
  ensureAudio();
  playTone(880, 0.15, 'sine', 0.08);
  if (callback) setTimeout(callback, Math.max(text.length * 200, 800));
}

// 数字转中文读法
function numToChinese(n) {
  const map = ['零','一','二','三','四','五','六','七','八','九','十'];
  return map[n] || String(n);
}

let bgmPlaying = false;
let bgmTimer = null;
let bgmNodes = [];

// 钢琴音色合成（更柔和、有泛音）
function playPianoNote(freq, startTime, duration, vol=0.07) {
  ensureAudio();
  // 基音
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = 'sine';
  osc1.frequency.value = freq;
  // 轻微的泛音让音色更丰富
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;

  const gain2 = audioCtx.createGain();
  gain2.gain.value = 0.15; // 泛音很轻

  osc1.connect(gain);
  osc2.connect(gain2);
  gain2.connect(gain);
  gain.connect(audioCtx.destination);

  // 包络：快起慢落，模拟钢琴
  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.exponentialRampToValueAtTime(vol, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(vol * 0.6, startTime + duration * 0.3);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

  osc1.start(startTime);
  osc1.stop(startTime + duration + 0.05);
  osc2.start(startTime);
  osc2.stop(startTime + duration + 0.05);

  bgmNodes.push(osc1, osc2, gain, gain2);
}

// Let It Go — Ab 大调八音盒风格完整版
// 原曲 BPM ~137，这里放慢为 ~80 作为舒缓背景乐
function getLetItGoMelody() {
  const N = {
    'F3': 174.61, 'G3': 196.00, 'Ab3': 207.65, 'Bb3': 233.08,
    'C4': 261.63, 'Db4': 277.18, 'Eb4': 311.13, 'F4': 349.23, 'G4': 392.00,
    'Ab4': 415.30, 'Bb4': 466.16, 'C5': 523.25, 'Db5': 554.37,
    'Eb5': 622.25, 'F5': 698.46, 'G5': 783.99, 'Ab5': 830.61,
    'R': 0
  };

  const BPM = 80;
  const q = 60 / BPM;        // 四分音符 0.75s
  const e = q / 2;            // 八分音符
  const h = q * 2;            // 二分音符
  const dq = q * 1.5;         // 附点四分
  const dh = q * 3;           // 附点二分
  const w = q * 4;            // 全音符
  const s = q / 4;            // 十六分音符

  const melody = [
    // === 前奏（钢琴琶音 Fm → Ab） ===
    ['F3', e], ['C4', e], ['F4', e], ['Ab4', e],
    ['F4', e], ['C4', e],
    ['Ab3', e], ['Eb4', e], ['Ab4', e], ['C5', e],
    ['Ab4', e], ['Eb4', e],
    ['R', q],

    // === 主歌第一段 ===
    // "The snow glows white on the mountain tonight"
    // Ab Bb | C C C C | Bb Ab | Ab-
    ['Ab4', q], ['Bb4', q],
    ['C5', e], ['C5', e], ['C5', e], ['C5', e],
    ['Bb4', q], ['Ab4', q],
    ['Ab4', h],
    // "Not a footprint to be seen"
    // Ab Bb | C C C C | Bb Ab Bb-
    ['Ab4', q], ['Bb4', q],
    ['C5', e], ['C5', e], ['C5', e], ['C5', e],
    ['Bb4', e], ['Ab4', e], ['Bb4', h],
    ['R', q],

    // "A kingdom of isolation"
    // Ab Bb | C C C C | Db C Bb Ab
    ['Ab4', q], ['Bb4', q],
    ['C5', e], ['C5', e], ['C5', e], ['C5', e],
    ['Db5', e], ['C5', e], ['Bb4', q],
    // "and it looks like I'm the queen"
    // Bb C Db | Db Db C Bb | C-
    ['Bb4', e], ['C5', e], ['Db5', q],
    ['Db5', e], ['Db5', e], ['C5', e], ['Bb4', e],
    ['C5', h],
    ['R', q],

    // === 副歌 "Let it go, let it go" ===
    // Ab Bb | C---
    ['Ab4', q], ['Bb4', q], ['C5', dh],
    ['R', e],
    // "Can't hold it back anymore"
    ['Ab4', q], ['Bb4', e], ['Db5', e], ['C5', dh],
    ['R', e],
    // Ab Bb C C | C Bb Ab Ab
    ['Ab4', q], ['Bb4', q], ['C5', q], ['C5', e], ['Bb4', e],
    ['Ab4', dq], ['R', e],

    // "Let it go, let it go"
    ['Ab4', q], ['Bb4', q], ['C5', dh],
    ['R', e],
    // "Turn away and slam the door"
    ['Eb5', dq], ['Db5', e], ['C5', q], ['C5', h],
    ['R', e],
    ['Ab4', q], ['Bb4', q], ['C5', q], ['C5', e], ['Bb4', e],
    ['Ab4', h],
    ['R', h],

    // === 桥段 "I don't care" ===
    // Eb4 Ab4 C5 Eb5 | C5 Ab4
    ['Eb4', e], ['Ab4', e], ['C5', e], ['Eb5', e],
    ['C5', e], ['Ab4', e],
    ['R', q],

    // "I don't care what they're going to say"
    ['C5', q], ['C5', e], ['Bb4', e], ['Ab4', q],
    ['Bb4', q], ['C5', dq], ['R', e],

    // "Let the storm rage on"
    ['Eb5', dq], ['Db5', e], ['C5', q], ['Bb4', q],
    ['C5', dh],
    ['R', q],

    // "The cold never bothered me anyway"
    ['Ab4', q], ['Bb4', e], ['C5', e], ['C5', q],
    ['Bb4', e], ['Ab4', e], ['G4', q],
    ['Ab4', dh],
    ['R', h],

    // === 尾声琶音（渐弱） ===
    ['Eb4', e], ['Ab4', e], ['C5', e], ['Eb5', e],
    ['Ab5', dq], ['Eb5', e],
    ['C5', q], ['Ab4', q],
    ['R', dh],
  ];

  return melody.map(([note, dur]) => ({
    freq: N[note],
    duration: dur
  }));
}

function playLetItGo() {
  if (!bgmPlaying) return;
  ensureAudio();
  bgmNodes = [];

  const melody = getLetItGoMelody();
  let time = audioCtx.currentTime + 0.1;

  melody.forEach(({ freq, duration }) => {
    if (freq > 0) {
      playPianoNote(freq, time, duration * 0.9, 0.06);
    }
    time += duration;
  });

  // 整首旋律的总时长
  const totalDuration = melody.reduce((sum, n) => sum + n.duration, 0);

  // 循环播放
  bgmTimer = setTimeout(() => {
    if (bgmPlaying) playLetItGo();
  }, totalDuration * 1000 + 500);
}

function startBgm() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  document.getElementById('musicBtn').classList.add('playing');
  document.getElementById('musicBtn').textContent = '🎶';
  playLetItGo();
}

function stopBgm() {
  bgmPlaying = false;
  document.getElementById('musicBtn').classList.remove('playing');
  document.getElementById('musicBtn').textContent = '🔇';
  if (bgmTimer) {
    clearTimeout(bgmTimer);
    bgmTimer = null;
  }
  // 停止所有正在播放的音符
  bgmNodes.forEach(node => {
    try { node.disconnect(); } catch(e) {}
  });
  bgmNodes = [];
}

function toggleMusic() {
  ensureAudio();
  if (bgmPlaying) {
    stopBgm();
  } else {
    startBgm();
  }
}

// 为指定关卡随机生成题目
function generatePairs(levelIdx) {
  const lv = LEVELS[levelIdx];
  const allPossible = [];
  // 枚举所有满足条件的 (a,b) 组合
  for (let a = lv.minA; a <= lv.maxA; a++) {
    for (let b = lv.minB; b <= lv.maxB; b++) {
      if (a + b <= lv.maxSum) {
        allPossible.push([a, b]);
      }
    }
  }
  // 洗牌
  for (let i = allPossible.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allPossible[i], allPossible[j]] = [allPossible[j], allPossible[i]];
  }
  // 取需要的数量，如果可选题不够就循环复用（再次洗牌）
  const result = [];
  while (result.length < lv.count) {
    const remaining = lv.count - result.length;
    if (remaining >= allPossible.length) {
      result.push(...allPossible);
      // 再洗一次，保证下一轮顺序不同
      for (let i = allPossible.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allPossible[i], allPossible[j]] = [allPossible[j], allPossible[i]];
      }
    } else {
      result.push(...allPossible.slice(0, remaining));
    }
  }
  return result;
}

  isAnimating = true;

  document.getElementById('optionsArea').innerHTML = '';

  // 重置算式
  document.getElementById('formulaDisplay').classList.remove('show');
  document.getElementById('formulaA').textContent = '';
  document.getElementById('formulaA').classList.remove('show');
  document.getElementById('formulaPlus').classList.remove('show');
  document.getElementById('formulaB').textContent = '';
  document.getElementById('formulaB').classList.remove('show');
  document.getElementById('formulaEquals').classList.remove('show');
  document.getElementById('formulaAnswer').textContent = '?';
  document.getElementById('formulaAnswer').classList.remove('show');

  const emoji = level.flakeEmoji;
  const itemNames = {
    '❄️': '雪花', '⭐': '星星', '⛄': '雪人', '🦌': '小鹿', '🏰': '城堡',
    '💎': '钻石', '🌈': '彩虹', '🎀': '蝴蝶结', '👑': '皇冠', '🏆': '奖杯'
  };
  const itemName = itemNames[emoji] || '宝贝';

  const mode = level.mode || 'choose3';

  // 检查是否还是当前题目（防止旧回调）
  function isStale() { return questionId !== myQid; }

  // 第1步：开场语
  const openLines = ['小公主，来看看！', '艾莎要变魔法啦！', '准备好了吗？', '新的题来啦！',
                     '再来一题！', '继续加油！', '这次试试看！', '来看这个！', '又有新题啦！', '加油呀！'];
  const openLine = openLines[currentQuestion % openLines.length];
  document.getElementById('dialogText').textContent = openLine;

  elsaSpeak(openLine, () => {
    if (isStale()) return;
    // 第2步：左组物品逐个出现
    showFlakesSequentially('groupA', numA, emoji, () => {
      if (isStale()) return;
      document.getElementById('formulaDisplay').classList.add('show');
      document.getElementById('formulaA').textContent = numA;
      document.getElementById('formulaA').classList.add('show');

      setTimeout(() => {
        if (isStale()) return;
        // 第3步：右组物品逐个出现
        showFlakesSequentially('groupB', numB, emoji, () => {
          if (isStale()) return;
          document.getElementById('formulaPlus').classList.add('show');
          document.getElementById('formulaB').textContent = numB;
          document.getElementById('formulaB').classList.add('show');

          // 第4步：读题
          const readQuestion = numToChinese(numA) + '个' + itemName + '，加' + numToChinese(numB) + '个' + itemName + '，等于几呢？';
          document.getElementById('dialogText').textContent = numA + '个' + itemName + ' + ' + numB + '个' + itemName + ' = ？';
          document.getElementById('formulaEquals').classList.add('show');
          document.getElementById('formulaAnswer').textContent = '?';
          document.getElementById('formulaAnswer').classList.add('show');

          elsaSpeak(readQuestion, () => {
            if (isStale()) return;
            if (mode === 'count') {
              // 数数模式：读题说完后再说合并
              document.getElementById('dialogText').textContent = '✨ 把它们放到一起！';
              elsaSpeak('把它们放到一起吧！', () => {
                if (isStale()) return;
                startMergeAndCount();
              });
            } else {
              const optCount = mode === 'choose2' ? 2 : 3;
              document.getElementById('countHintBtn').style.display = 'block';
              document.getElementById('countDisplay').textContent = '👆 不确定就点' + itemName + '数一数';
              showOptions(optCount);
              isAnimating = false;
              canAnswer = true;
            }
          });
        });
      }, 200);
    });
  });
}

// 逐个显示雪花（带动画间隔），完成后回调
function showFlakesSequentially(groupId, count, emoji, callback) {
  const group = document.getElementById(groupId);
  const flakes = [];
  for (let i = 0; i < count; i++) {
    const flake = document.createElement('span');
    flake.className = 'flake-item';
    flake.textContent = emoji;
    group.appendChild(flake);
    flakes.push(flake);
  }
  let idx = 0;
  function showNext() {
    if (idx >= flakes.length) {
      setTimeout(callback, 200);
      return;
    }
    flakes[idx].classList.add('show');
    playTone(400 + idx * 80, 0.15, 'sine', 0.06);
    idx++;
    setTimeout(showNext, 300);
  }
  setTimeout(showNext, 150);
}

// ===== 魔法合并 + 点数答题（前3关核心玩法）=====
function startMergeAndCount() {
  const level = LEVELS[currentLevel];
  const emoji = level.flakeEmoji;

  // 隐藏两组展示区，显示合并区
  document.getElementById('snowflakeDisplay').style.display = 'none';
  const mergeArea = document.getElementById('mergeArea');
  mergeArea.innerHTML = '';
  mergeArea.style.display = 'flex';

  // 播放魔法音效
  playMagicSound();

  // 把所有物品放入合并区（带飞入动画）
  for (let i = 0; i < answer; i++) {
    const flake = document.createElement('span');
    flake.className = 'flake-item';
    flake.textContent = emoji;
    flake.style.opacity = '0.4';
    flake.style.transform = 'scale(0)';
    flake.dataset.countIdx = i;
    mergeArea.appendChild(flake);

    // 逐个飞入动画
    setTimeout(() => {
      flake.style.transition = 'all 0.4s ease-out';
      flake.style.opacity = '0.4';
      flake.style.transform = 'scale(1)';
      playTone(500 + i * 60, 0.1, 'sine', 0.05);
    }, i * 150);
  }

  // 全部飞入后，提示点数
  setTimeout(() => {
    countIndex = 0;
    isCountingMode = true;
    document.getElementById('dialogText').textContent = '👆 点一个数一个！';
    document.getElementById('countDisplay').textContent = '';
    elsaSpeak('现在点一个数一个吧！');

    // 给每个物品绑定点击事件
    for (let i = 0; i < answer; i++) {
      mergeArea.children[i].addEventListener('click', () => handleCountTap(i));
      mergeArea.children[i].style.cursor = 'pointer';
    }
    isAnimating = false;
  }, answer * 150 + 500);
}

// 点数答题的点击处理
function handleCountTap(idx) {
  if (idx !== countIndex) return;
  const mergeArea = document.getElementById('mergeArea');
  const flake = mergeArea.children[idx];

  // 点亮 + 弹跳动画
  flake.style.opacity = '1';
  flake.classList.add('counted');
  flake.style.transform = 'scale(1.3)';
  setTimeout(() => { flake.style.transform = 'scale(1)'; }, 200);

  countIndex++;
  playCountSound(countIndex - 1);

  // 显示当前数到几
  document.getElementById('countDisplay').textContent = '🔢 ' + countIndex;

  if (countIndex >= answer) {
    // 数完了！自动算对
    isCountingMode = false;
    canAnswer = false;

    setTimeout(() => {
      // 更新算式显示答案
      document.getElementById('formulaAnswer').textContent = answer;
      document.getElementById('formulaAnswer').classList.add('show');

      const formulaText = numA + ' + ' + numB + ' = ' + answer;
      document.getElementById('dialogText').textContent = formulaText + ' 🎉 太棒了！';
      document.getElementById('countDisplay').textContent = '';

      playCorrectSound();
      starsEarned++;
      updateStarsBar();

      // 语音说出公式
      const praises = ['太棒了！', '你真聪明！', '小公主真厉害！', '太了不起了！', '完美！'];
      const praise = praises[currentQuestion % praises.length];
      elsaSpeak(numToChinese(numA) + '加' + numToChinese(numB) + '等于' + numToChinese(answer) + '！' + praise, () => {
        setTimeout(() => {
          currentQuestion++;
          nextQuestion();
        }, 500);
      });

      // 粒子特效
      const mergeRect = document.getElementById('mergeArea').getBoundingClientRect();
      createMagicBurst({ getBoundingClientRect: () => mergeRect });
    }, 500);
  }
}

// ===== 数一数功能 =====
function startCounting() {
  if (isCountingMode) return;
  isCountingMode = true;
  countIndex = 0;
  document.getElementById('countHintBtn').style.display = 'none';

  // 合并雪花到一起
  const level = LEVELS[currentLevel];
  const emoji = level.flakeEmoji;
  const mergeArea = document.getElementById('mergeArea');
  mergeArea.innerHTML = '';
  mergeArea.style.display = 'flex';
  document.getElementById('snowflakeDisplay').style.display = 'none';

  elsaSpeak('把它们放在一起，数一数吧！');
  document.getElementById('dialogText').textContent = '放在一起，数一数吧！';

  for (let i = 0; i < answer; i++) {
    const flake = document.createElement('span');
    flake.className = 'flake-item show';
    flake.textContent = emoji;
    flake.dataset.countIdx = i;
    flake.style.opacity = '0.4';
    flake.addEventListener('click', () => countFlake(i));
    mergeArea.appendChild(flake);
  }

  document.getElementById('countDisplay').textContent = '👆 点一个，数一个！';
}

function countFlake(idx) {
  if (idx !== countIndex) return; // 必须按顺序点
  const mergeArea = document.getElementById('mergeArea');
  const flake = mergeArea.children[idx];
  flake.style.opacity = '1';
  flake.classList.add('counted');
  countIndex++;
  playCountSound(countIndex - 1);

  // 语音报数
  elsaSpeak(numToChinese(countIndex));

  document.getElementById('countDisplay').textContent = countIndex + ' ！';

  if (countIndex >= answer) {
    // 数完了！说出完整算式
    setTimeout(() => {
      const formulaText = numA + ' + ' + numB + ' = ' + answer + ' ！';
      document.getElementById('countDisplay').textContent = formulaText + ' 🎉';
      document.getElementById('dialogText').textContent = '对啦！' + formulaText;
      elsaSpeak('一共' + numToChinese(answer) + '个！所以，' +
                numToChinese(numA) + '加' + numToChinese(numB) + '等于' + numToChinese(answer) + '！');

      // 更新算式展示
      document.getElementById('formulaAnswer').textContent = answer;
      document.getElementById('formulaAnswer').classList.add('show');

      // 高亮正确答案按钮
      setTimeout(() => {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => {
          if (parseInt(b.dataset.value) === answer) {
            b.style.border = '3px solid #ffd54f';
            b.style.boxShadow = '0 0 20px rgba(255,213,79,0.5)';
          }
        });
      }, 800);
    }, 300);
  }
}

// ===== 选项 =====
function showOptions(optCount) {
  optCount = optCount || 3;
  const optionsArea = document.getElementById('optionsArea');
  optionsArea.innerHTML = '';

  const level = LEVELS[currentLevel];
  const emoji = level.flakeEmoji;

  // 生成干扰项
  let options = [answer];
  const makeDistractor = () => {
    let d;
    do {
      d = answer + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 2) + 1);
    } while (d < 1 || d > 10 || options.includes(d));
    return d;
  };
  for (let i = 1; i < optCount; i++) {
    options.push(makeDistractor());
  }

  // 打乱顺序
  options.sort(() => Math.random() - 0.5);

  options.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.value = val;

    const numSpan = document.createElement('div');
    numSpan.className = 'num';
    numSpan.textContent = val;

    const miniFlakes = document.createElement('div');
    miniFlakes.className = 'mini-flakes';
    miniFlakes.textContent = emoji.repeat(val);

    btn.appendChild(numSpan);
    btn.appendChild(miniFlakes);
    btn.addEventListener('click', () => checkAnswer(val, btn));
    optionsArea.appendChild(btn);
  });
}

// ===== 检查答案 =====
function checkAnswer(val, btn) {
  if (!canAnswer || isAnimating) return;

  if (val === answer) {
    // 正确！
    canAnswer = false;
    btn.classList.add('correct-flash');
    playCorrectSound();
    starsEarned++;
    updateStarsBar();

    // 显示完整算式
    const formulaText = numA + ' + ' + numB + ' = ' + answer;
    document.getElementById('formulaAnswer').textContent = answer;
    document.getElementById('formulaAnswer').classList.add('show');
    document.getElementById('dialogText').textContent = formulaText + '  太棒了！✨';
    document.getElementById('countDisplay').textContent = '';

    // 艾莎语音说出完整公式 + 鼓励
    const praises = ['太棒了！', '你真聪明！', '小公主真厉害！', '太了不起了！', '完美！'];
    const praise = praises[currentQuestion % praises.length];
    elsaSpeak(numToChinese(numA) + '加' + numToChinese(numB) + '等于' + numToChinese(answer) + '！' + praise, () => {
      // 等语音说完再进入下一题
      setTimeout(() => {
        currentQuestion++;
        nextQuestion();
      }, 500);
    });

    // 魔法粒子特效
    createMagicBurst(btn);
  } else {
    // 答错 - 温柔引导 + 语音鼓励
    btn.classList.add('wrong-flash');
    playWrongSound();
    setTimeout(() => btn.classList.remove('wrong-flash'), 400);

    const encourages = [
      { text: '再想想呀～💙', voice: '再想想呀，不着急！' },
      { text: '没关系，再试试！', voice: '没关系的，再试一次！' },
      { text: '数一数就知道啦～', voice: '没关系的，再试一次！' },
    ];
    const enc = encourages[Math.floor(Math.random() * encourages.length)];
    document.getElementById('dialogText').textContent = enc.text;
    elsaSpeak(enc.voice);

    // 如果还没进入数一数模式，显示按钮
    if (!isCountingMode) {
      document.getElementById('countHintBtn').style.display = 'block';
      document.getElementById('countDisplay').textContent = '👆 试试数一数吧';
    }
  }
}

// ===== 魔法粒子特效 =====
function createMagicBurst(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 15; i++) {
    const particle = document.createElement('div');
    particle.className = 'magic-particle';
    const size = 4 + Math.random() * 8;
    const angle = (Math.PI * 2 * i) / 15;
    const dist = 40 + Math.random() * 60;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;

    const colors = ['#64b5f6', '#ce93d8', '#ffd54f', '#80deea', '#fff'];
    particle.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: ${size}px; height: ${size}px;
      background: ${colors[i % colors.length]};
      --tx: ${tx}px; --ty: ${ty}px;
      animation-delay: ${i * 30}ms;
    `;
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 1200);
  }
}

// ===== 庆祝纸屑 =====
function launchCelebration() {
  const container = document.getElementById('celebration');
  container.innerHTML = '';
  container.classList.add('active');

  const colors = ['#64b5f6', '#ce93d8', '#ffd54f', '#80deea', '#ef5350', '#66bb6a', '#ff8a65'];
  for (let i = 0; i < 50; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.top = '-10px';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDelay = Math.random() * 0.8 + 's';
    confetti.style.animationDuration = (1 + Math.random() * 1.5) + 's';
    const w = 6 + Math.random() * 10;
    confetti.style.width = w + 'px';
    confetti.style.height = (w * 0.6) + 'px';
    container.appendChild(confetti);
  }
  playMagicSound();
  setTimeout(() => {
    container.classList.remove('active');
    container.innerHTML = '';
  }, 3000);
}

// ===== 关卡完成 =====
function showLevelComplete() {
  launchCelebration();
  playCorrectSound();

  const level = LEVELS[currentLevel];
  document.getElementById('completeTitle').textContent =
    currentLevel < LEVELS.length - 1 ? level.name + ' 完成啦！' : '全部完成！';
  document.getElementById('completeSubtitle').textContent =
    '你获得了 ' + starsEarned + ' 颗星星！';
  document.getElementById('completeStars').textContent = '⭐'.repeat(starsEarned);

  if (currentLevel >= LEVELS.length - 1) {
    showScreen('all-complete');
  } else {
    document.getElementById('nextLevelBtn').style.display = 'inline-block';
    showScreen('level-complete');
  }
}

function nextLevel() {
  currentLevel++;
  if (currentLevel >= LEVELS.length) {
    showScreen('all-complete');
  } else {
    startLevel();
  }
}

function replayLevel() {
  startLevel();
}

// ===== 初始化 =====
window.addEventListener('DOMContentLoaded', () => {
  initStars();
  initSnow();
  initTTS();
});

// 防止页面滚动弹跳（但允许关卡选择页面滚动）
document.body.addEventListener('touchmove', e => {
  const levelSelect = document.getElementById('level-select');
  if (levelSelect && levelSelect.style.display !== 'none' && levelSelect.contains(e.target)) {
    return; // 允许关卡选择页面滚动
  }
  e.preventDefault();
}, { passive: false });
</script>
